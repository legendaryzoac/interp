name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC federation with AWS — no long-lived keys
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build -w web
        env:
          # Model weights are served from the Hugging Face Hub, not S3.
          # TODO: replace with the real HF repo base URL once it exists,
          # e.g. https://huggingface.co/<user>/interp-gpt2/resolve/main
          VITE_MODEL_BASE_URL: https://huggingface.co/PLACEHOLDER/resolve/main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Hashed assets get immutable long-lived caching; everything else
      # revalidates quickly so deploys show up fast.
      - name: Sync hashed assets (immutable, long cache)
        run: >
          aws s3 sync web/dist/assets "s3://${{ vars.S3_BUCKET }}/assets"
          --delete
          --cache-control "public,max-age=31536000,immutable"

      - name: Sync everything else (short cache)
        run: >
          aws s3 sync web/dist "s3://${{ vars.S3_BUCKET }}"
          --exclude "assets/*"
          --delete
          --cache-control "public,max-age=60"

      - name: Invalidate CloudFront
        run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          --paths "/index.html"
